services:
  - type: web
    name: njl-catalogue
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PARQUET_BLOB_URL
        sync: false
      - key: REFRESH_INTERVAL_MINUTES
        value: "30"
      - key: REFRESH_SECRET
        sync: false
    healthCheckPath: /api/health
